---
- name: Ajouter la cle GPG officielle Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajouter le depot Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker Engine et Docker Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Demarrer et activer Docker au boot
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Ajouter l utilisateur ubuntu au groupe docker
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Installer le module Python Docker pour Ansible
  apt:
    name: python3-docker
    state: present
